services:
    postgres:
        image: postgres:${VERSION:-latest}
        container_name: postgres-${VERSION:-latest}
        restart: always
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASS}
            POSTGRES_DB: ${DB_NAME}
        labels:
            - name=postgres
            - dev.dozzle.group=postgres
        ports:
            - '${FORWARD_DB_PORT}:${DB_PORT}'
        volumes:
            - postgres-${VERSION:-latest}:/var/lib/postgresql/data:Z
        networks:
            - shared_network
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
            interval: 1h
            retries: 10
            start_period: 1m
        deploy:
            restart_policy:
                condition: always
            resources:
                limits:
                    cpus: '2'
                    memory: '2048M'

volumes:
    postgres-${VERSION:-latest}:
        name: postgres-${VERSION:-latest}

networks:
    shared_network:
        name: shared_network
        driver: bridge
